name: Meu Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mensagem_input:
        description: "Mensagem vinda do input"
        required: true
        default: "Olá do input!"

env:
  EXEMPLO_VAR: "Valor Variavel de Exemplo"

jobs:
  job01:
    name: "Job de Teste 01"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v3

      - name: "Exibir mensagem de teste"
        run: |
          echo "Este é um teste de workflow." 
          ls -la
            
      - name: "Exibir data e hora atuais"
        run: | 
          date
          echo "Variável de exemplo: $EXEMPLO_VAR"

      - name: "Verificar versão do Node.js"
        run: node -v

      - name: "Dados do Runner"
        run: |
          echo "Sistema operacional: ${RUNNER_OS}"
          echo "Diretório do runner: ${RUNNER_TEMP}"
          echo "Nome do runner: ${RUNNER_NAME}"
          echo "Versão do runner: ${RUNNER_VERSION}"
          echo "Diretório atual: ${PWD}"

  job02:
    name: "Job de Teste 02"
    runs-on: ubuntu-latest
    needs: job01 

    steps:
      - name: "Exibir informações"
        run: |
          echo "Echo 1: Iniciando job02"
          echo "Echo 2: Variável -> $EXEMPLO_VAR"
          echo "Echo 3: Input -> ${{ github.event.inputs.mensagem_input }}"

      - name: "Usando Secret"
        run: |
          echo "Secret carregado com sucesso!"
          # Exemplo de uso (não exibir o valor real em produção)
          echo "Tamanho do secret: ${#MEU_SECRET}"
        env:
          MEU_SECRET: ${{ secrets.MEU_SECRET }}
